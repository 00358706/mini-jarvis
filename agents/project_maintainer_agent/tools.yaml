# tools.yaml — tools this agent may reference in proposed plans.
#
# STATUS (current phase): entries under allowed_tools are proposal references
# only. They do not grant execution authority. Plans still require registry
# installed-tool presence, schema validation, approval, and sandbox execution.
#
# Schema:
#   enforcement:
#     mode: strict|advisory
#   allowed_tools:
#     - name: string
#       version: string|null
#       rationale: string
#   constraints: ...

description: >
  Strict proposal allowlist for project maintenance planning. These names are
  references only unless the same tools are installed in the registry.
  Missing/uninstalled tools must fail safely at policy time.

enforcement:
  mode: strict

allowed_tools:
  - name: inspect_file
    version: null
    rationale: Read or structure-aware inspection of a repository path (future).
  - name: summarize_file
    version: null
    rationale: Condense file contents for review without executing code (future).
  - name: propose_patch
    version: null
    rationale: Emit a unified-diff or edit description for human or CI application (future).
  - name: check_invariants
    version: null
    rationale: Run agreed checks (docs vs code, layer boundaries) without mutating runtime (future).

constraints:
  agents_must_not_execute: true
  proposal_references_only_until_registry_install: true
  proposals_reference_registry_when_tools_exist: true
